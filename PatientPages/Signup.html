<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../Styles/style.css" />
    <title>Signup</title>
  </head>
  <body>
    <!-- ================ Auth(Signup) ================ -->
      <section class="login-sec">
      <div class="min-h-screen flex items-center justify-center p-4 relative">
        <div
          id="name-error"
          class="hidden absolute top-6 left-1/2 -translate-x-1/2 flex items-center justify-center gap-2 text-xs md:text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 md:px-4 md:py-2 shadow-md w-[85%] md:w-[420px] text-center opacity-0 -translate-y-2 transition-all duration-300 ease-out"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-3.5 h-3.5 md:w-4 md:h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 9v2m0 4h.01M10.29 3.86l-7.39 12.8A2 2 0 004.71 20h14.58a2 2 0 001.81-3.34l-7.39-12.8a2 2 0 00-3.42 0z"
            />
          </svg>
          <span id="error-text">Please enter your name</span>
        </div>  

        <div class="w-[620px] bg-white rounded-xl shadow-lg p-8">
          <div class="logo-div-login">
            <img src="../images/Group 53.png" />
            <h2 class="text-1xl font-bold text-gray-900 mb-6 text-center">
              Create Account
            </h2>
          </div>

          <form class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Profile Picture</label>
              <input
                type="file"
                accept="image/*"
                id="profile-pic"
                class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer text-gray-500"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
              <input
                id="user-name"
                type="text"
                class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                placeholder="username"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input
                id="emaill"
                type="email"
                class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                placeholder="your@email.com"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input
                type="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                placeholder="••••••••"
              />
            </div>

            <div>
              <select
                id="select"
                class="w-full px-4 py-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white text-gray-400"
              >
                <option value="">Select type</option>
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
              </select>
            </div>

            <div class="flex items-center justify-between">
              <label class="flex items-center">
                <input
                  type="checkbox"
                  class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                />
                <span class="ml-1 text-sm text-gray-600">
                  I accept the
                  <a class="term-condation">Terms & Conditions </a>
                </span>
              </label>
            </div>

            <button
              id="signup-btn"
              class="w-full text-white font-medium py-3 rounded-full transition-colors btn-login"
            > 
              Signup
            </button>
          </form>

          <div class="mt-6 text-center text-sm text-gray-600">
            Already have an account?
            <a href="../index.html" class="login-link font-medium">Login </a>
          </div>
        </div>
      </div>
    </section> 

    <script src="../Js/Signup.js"></script>
  </body>
</html>
